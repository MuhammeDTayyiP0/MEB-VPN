name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download Xray (Windows)
        run: |
          mkdir -p resources/xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-windows-64.zip
          Expand-Archive xray.zip -DestinationPath resources/xray
          Remove-Item xray.zip

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install dependencies
        run: npm ci

      - name: Generate multi-size icons
        run: |
          mkdir -p resources/icons
          for size in 16 32 48 64 128 256 512; do
            convert resources/icon.png -resize ${size}x${size} resources/icons/${size}x${size}.png
          done

      - name: Download Xray (Linux)
        run: |
          mkdir -p resources/xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip xray.zip -d resources/xray
          chmod +x resources/xray/xray
          rm xray.zip

      - name: Build Linux (deb + AppImage + tar.gz)
        run: npm run build:linux

      - name: Create user installer
        run: |
          chmod +x scripts/create-user-installer.sh
          VERSION=$(node -p "require('./package.json').version")
          TAR_FILE=$(ls dist/*.tar.gz 2>/dev/null | head -1)
          if [ -n "$TAR_FILE" ]; then
            ./scripts/create-user-installer.sh "$TAR_FILE" "$VERSION"
          else
            echo "Warning: tar.gz not found, skipping user installer"
          fi

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*-user-installer.sh

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: Download Linux Build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MEB VPN ${{ github.ref_name }}
          body: |
            ## MEB VPN ${{ github.ref_name }}

            ### İndirme
            | Platform | Dosya | Kurulum |
            |----------|-------|---------|
            | Windows | `MEB VPN Setup *.exe` | Kurulum sihirbazını çalıştırın |
            | Linux (Sudo) | `*.deb` | `sudo dpkg -i meb-vpn_*.deb` |
            | Linux (Sudosuz) | `*-user-installer.sh` | `chmod +x *-user-installer.sh && ./*-user-installer.sh` |
            | Linux (Portable) | `*.AppImage` | `chmod +x *.AppImage && ./*.AppImage` |

            ### Sudosuz Kurulum (Öğretmen/Öğrenci)
            Sudo yetkisi olmayan kullanıcılar için **user-installer.sh** dosyasını indirin:
            ```bash
            chmod +x meb-vpn-*-user-installer.sh
            ./meb-vpn-*-user-installer.sh
            ```
            - ✅ Sudo gerektirmez
            - ✅ Uygulamalar menüsünde görünür
            - ✅ Terminalden `meb-vpn` komutuyla başlatılabilir
            - 🗑️ Kaldırma: `./meb-vpn-*-user-installer.sh --uninstall`
          files: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*-user-installer.sh
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
